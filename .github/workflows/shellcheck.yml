name: ShellCheck

on:
  push:
    branches: [ master, traefikv3 ]
  pull_request:
    branches: [ master ]

jobs:
  shellcheck:
    name: Shell Script Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: info
          # Ignore sample files and directories
          ignore_paths: |
            .git
